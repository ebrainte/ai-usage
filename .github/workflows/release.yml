name: Release & Update Homebrew

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
            artifact: ai-usage-darwin-arm64
          - os: macos-13
            arch: x86_64
            artifact: ai-usage-darwin-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Build binary
        run: uv run pyinstaller ai-usage.spec --clean

      - name: Rename binary
        run: mv dist/ai-usage dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/ai-usage-darwin-arm64/ai-usage-darwin-arm64 \
            artifacts/ai-usage-darwin-x86_64/ai-usage-darwin-x86_64

      - name: Compute SHA256 for binaries
        id: sha
        run: |
          SHA_ARM64=$(sha256sum artifacts/ai-usage-darwin-arm64/ai-usage-darwin-arm64 | cut -d ' ' -f 1)
          SHA_X86=$(sha256sum artifacts/ai-usage-darwin-x86_64/ai-usage-darwin-x86_64 | cut -d ' ' -f 1)
          echo "sha256_arm64=${SHA_ARM64}" >> "$GITHUB_OUTPUT"
          echo "sha256_x86_64=${SHA_X86}" >> "$GITHUB_OUTPUT"
          echo "ARM64 SHA256: ${SHA_ARM64}"
          echo "x86_64 SHA256: ${SHA_X86}"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SHA_ARM64="${{ steps.sha.outputs.sha256_arm64 }}"
          SHA_X86="${{ steps.sha.outputs.sha256_x86_64 }}"
          BASE_URL="https://github.com/ebrainte/ai-usage/releases/download/${TAG}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ebrainte/homebrew-tap.git" tap
          cd tap

          cat > Formula/ai-usage.rb << EOF
          class AiUsage < Formula
            desc "Track AI subscription usage across Claude, ChatGPT, and GitHub Copilot"
            homepage "https://github.com/ebrainte/ai-usage"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/ai-usage-darwin-arm64"
                sha256 "${SHA_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/ai-usage-darwin-x86_64"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install Dir["ai-usage-darwin-*"].first => "ai-usage"
            end

            test do
              assert_match "usage", shell_output("#{bin}/ai-usage --help")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/ai-usage.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-usage.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ai-usage to ${VERSION}"
          git push
